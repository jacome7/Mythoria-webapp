steps:
  # Get secrets from Secret Manager for build args
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Retrieve secrets and set as environment variables for subsequent steps
        echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=mythoria-clerk-publishable-key)" >> /workspace/build-env
        echo "NEXT_PUBLIC_GA_MEASUREMENT_ID=$(gcloud secrets versions access latest --secret=mythoria-ga-measurement-id)" >> /workspace/build-env
        echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY)" >> /workspace/build-env

  # Build the container image with secrets from Secret Manager
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Load build environment variables
        source /workspace/build-env

        # Build with secrets as build args
        docker build \
          -t gcr.io/$PROJECT_ID/$_SERVICE_NAME \
          --build-arg NEXT_PUBLIC_BASE_URL="${_NEXT_PUBLIC_BASE_URL}" \
          --build-arg NEXT_PUBLIC_SUPPORTED_LOCALES="${_NEXT_PUBLIC_SUPPORTED_LOCALES}" \
          --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="$$NEXT_PUBLIC_GA_MEASUREMENT_ID" \
          --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" \
          --build-arg NEXT_PUBLIC_GOOGLE_ADS_ID="${_NEXT_PUBLIC_GOOGLE_ADS_ID}" \
          --build-arg NEXT_PUBLIC_GOOGLE_TAG_ID="${_NEXT_PUBLIC_GOOGLE_TAG_ID}" \
          --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="${_CLERK_SIGN_IN_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="${_CLERK_SIGN_UP_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="${_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="${_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL="${_CLERK_SIGN_UP_FORCE_REDIRECT_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_IS_DEVELOPMENT="${_NEXT_PUBLIC_CLERK_IS_DEVELOPMENT}" \
          --build-arg NEXT_PUBLIC_TTS_PROVIDER="${_NEXT_PUBLIC_TTS_PROVIDER}" \
          --build-arg NEXT_PUBLIC_DEFAULT_CURRENCY="${_NEXT_PUBLIC_DEFAULT_CURRENCY}" \
          --build-arg NEXT_PUBLIC_APP_DOMAIN="${_NEXT_PUBLIC_APP_DOMAIN}" \
          --build-arg NEXT_PUBLIC_ASSETS_BASE_URL="${_NEXT_PUBLIC_ASSETS_BASE_URL}" \
          .

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'

  # Deploy container image to Cloud Run with secrets from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--vpc-egress'
      - 'all-traffic'
      - '--set-env-vars'
      - '^|^NODE_ENV=production|NEXT_PUBLIC_BASE_URL=${_NEXT_PUBLIC_BASE_URL}|NEXT_PUBLIC_SUPPORTED_LOCALES=${_NEXT_PUBLIC_SUPPORTED_LOCALES}|NEXT_PUBLIC_TTS_PROVIDER=${_NEXT_PUBLIC_TTS_PROVIDER}|NEXT_PUBLIC_DEFAULT_CURRENCY=${_NEXT_PUBLIC_DEFAULT_CURRENCY}|NEXT_PUBLIC_APP_DOMAIN=${_NEXT_PUBLIC_APP_DOMAIN}|NEXT_PUBLIC_ASSETS_BASE_URL=${_NEXT_PUBLIC_ASSETS_BASE_URL}|STRIPE_API_VERSION=${_STRIPE_API_VERSION}|STRIPE_CREDIT_TAX_CODE=${_STRIPE_CREDIT_TAX_CODE}|KEYINVOICE_ENABLED=${_KEYINVOICE_ENABLED}|KEYINVOICE_API_URL=${_KEYINVOICE_API_URL}|KEYINVOICE_DRAFT_ONLY=${_KEYINVOICE_DRAFT_ONLY}|KEYINVOICE_DOC_TYPE=${_KEYINVOICE_DOC_TYPE}|KEYINVOICE_DOC_SERIES_ID=${_KEYINVOICE_DOC_SERIES_ID}|KEYINVOICE_PAYMENT_METHOD_ID_STRIPE=${_KEYINVOICE_PAYMENT_METHOD_ID_STRIPE}|KEYINVOICE_TAX_ID_BY_RATE_JSON=${_KEYINVOICE_TAX_ID_BY_RATE_JSON}|KEYINVOICE_FALLBACK_TAX_ID=${_KEYINVOICE_FALLBACK_TAX_ID}|KEYINVOICE_PRODUCT_IDS_BY_PACKAGE_KEY_JSON=${_KEYINVOICE_PRODUCT_IDS_BY_PACKAGE_KEY_JSON}|KEYINVOICE_REGISTER_AT=${_KEYINVOICE_REGISTER_AT}|DB_PORT=${_DB_PORT}|DB_NAME=${_DB_NAME}|CLERK_SIGN_IN_URL=${_CLERK_SIGN_IN_URL}|CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=${_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL}|CLERK_SIGN_UP_URL=${_CLERK_SIGN_UP_URL}|CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=${_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL}|CLERK_SIGN_UP_FORCE_REDIRECT_URL=${_CLERK_SIGN_UP_FORCE_REDIRECT_URL}|CLERK_OAUTH_CLIENT_ID=${_CLERK_OAUTH_CLIENT_ID}|MCP_AUTHORIZATION_SERVER_URL=${_MCP_AUTHORIZATION_SERVER_URL}|MCP_RESOURCE_URL=${_MCP_RESOURCE_URL}|MCP_WIDGET_DOMAIN=${_MCP_WIDGET_DOMAIN}|MCP_AUTH_ALLOW_SESSION_TOKEN=${_MCP_AUTH_ALLOW_SESSION_TOKEN}|NEXTAUTH_URL=${_NEXTAUTH_URL}|GOOGLE_CLOUD_PROJECT_ID=${_GOOGLE_CLOUD_PROJECT_ID}|GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}|PUBSUB_TOPIC=${_PUBSUB_TOPIC}|PUBSUB_AUDIOBOOK_TOPIC=${_PUBSUB_AUDIOBOOK_TOPIC}|STORAGE_BUCKET_NAME=${_STORAGE_BUCKET_NAME}|PUBLIC_STORAGE_BUCKET_NAME=${_PUBLIC_STORAGE_BUCKET_NAME}|STORY_GENERATION_WORKFLOW_URL=${_STORY_GENERATION_WORKFLOW_URL}|ADMIN_API_URL=${_ADMIN_API_URL}|NOTIFICATION_ENGINE_URL=${_NOTIFICATION_ENGINE_URL}'
      - '--set-secrets'
      - 'DB_HOST=mythoria-db-host:latest,DB_USER=mythoria-db-user:latest,DB_PASSWORD=mythoria-db-password:latest,NEXTAUTH_SECRET=mythoria-auth-secret:latest,CLERK_SECRET_KEY=mythoria-clerk-secret-key:latest,CLERK_WEBHOOK_SECRET=mythoria-clerk-webhook-secret:latest,CLERK_OAUTH_CLIENT_SECRET=CLERK_OAUTH_CLIENT_SECRET:latest,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=mythoria-clerk-publishable-key:latest,NEXT_PUBLIC_GA_MEASUREMENT_ID=mythoria-ga-measurement-id:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,KEYINVOICE_API_KEY=KEYINVOICE_API_KEY:latest,ADMIN_API_KEY=ADMIN_API_KEY:latest,NOTIFICATION_ENGINE_API_KEY=NOTIFICATION_ENGINE_API_KEY:latest,STORY_GENERATION_WORKFLOW_API_KEY=STORY_GENERATION_WORKFLOW_API_KEY:latest,SGW_WEBHOOK_SECRET=SGW_WEBHOOK_SECRET:latest,GOOGLE_ANALYTICS_API_SECRET=GOOGLE_ANALYTICS_API_SECRET:latest,LEAD_BOUNCE_API_SECRET=LEAD_BOUNCE_API_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME' # Use substitution

# Remove sensitive data from substitutions - all secrets now in Secret Manager
